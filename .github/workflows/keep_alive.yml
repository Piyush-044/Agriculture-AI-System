name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manually running it from the GitHub UI for testing

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Health Endpoint
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://agriculture-ai-system.onrender.com/api/health
